<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MDP Powertech | Careers</title>

    <!-- ================= BOOTSTRAP CSS ================= -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- ================= GOOGLE FONT ================= -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ================= GLOBAL CSS ================= -->
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />

    <!-- ================= PAGE-SPECIFIC CSS ================= -->
  </head>

  <body>
    <!-- ================= GLOBAL HEADER ================= -->
    <div id="header"></div>

    <!-- ================= ABOUT HERO SECTION ================= -->
    <section>
      <!-- BREADCRUMB -->
      <div
        style="
          height: 350px;
          background-image: url('assets/images/hero-section-bg.png');
          background-size: cover;
          background-position: center;
        "
      >
        <div class="container text-white px-3" style="padding-top: 75px">
          <p>Home / Careers</p>

          <!-- TITLE -->
          <h1 id="Career-title"></h1>
        </div>
      </div>
    </section>

    <!-- ================= CONTENT CARD SECTION ================= -->
    <section style="margin-top: -200px">
      <div class="container section">
        <div class="row align-items-start">
          <!-- LEFT CONTENT -->
          <div class="col-lg-7 col-md-12">
            <div class="mini-card-bg-light p-5 h-100">
              <h5 id="Career-subtitle"></h5>
              <p id="Career-description" class="mt-4"></p>
              <ul id="Career-specs" class="mt-3"></ul>
            </div>
          </div>

          <!-- RIGHT IMAGES -->
          <div class="col-lg-5 col-md-12">
            <div class="mini-card p-5">
              <h5 class="mb-4">Apply for this Role</h5>
              <form>
                <div class="row g-4">
                  <div class="col-md-12">
                    <label class="form-label">Contact Name</label>
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Enter Name"
                    />
                  </div>

                  <div class="col-md-12">
                    <label class="form-label">Company Name</label>
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Enter Company Name"
                    />
                  </div>

                  <div class="col-md-12">
                    <label class="form-label">Phone</label>
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Enter Phone"
                    />
                  </div>

                  <div class="col-md-12">
                    <label class="form-label">Email</label>
                    <input
                      type="email"
                      class="form-control"
                      placeholder="Enter Email"
                    />
                  </div>

                  <div class="col-12">
                    <label class="form-label">Upload Resume</label>
                    <textarea
                      class="form-control"
                      rows="4"
                      placeholder="Enter Message"
                    ></textarea>
                  </div>

                  <div class="col-12">
                    <label class="form-label">Message</label>
                    <textarea
                      class="form-control"
                      rows="4"
                      placeholder="Enter Message"
                    ></textarea>
                  </div>

                  <div class="col-12 text-end">
                    <button
                      type="submit"
                      class="btn btn-primary px-5 rounded-pill"
                    >
                      Submit
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ================= Blog SECTION ================= -->

    <div id="blog-section"></div>

    <!-- ================= GLOBAL FOOTER ================= -->
    <div id="footer"></div>

    <!-- ================= BOOTSTRAP JS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ================= GLOBAL JS (LOAD PARTIALS) ================= -->
    <script src="assets/js/main.js"></script>
  </body>
</html>
